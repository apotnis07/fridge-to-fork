<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="view-transition" content="same-origin" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Recipe Book</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#869489",
                        "on-primary": "#0e1f17",
                        "primary-container": "#394b41",
                        "on-primary-container": "#d3e7da",
                        "surface": "#121212",
                        "on-surface": "#e6e1e0",
                        "surface-variant": "#2b2b2b",
                        "on-surface-variant": "#c2c8c4",
                        "outline": "#8a938e",
                        "outline-variant": "#414945",
                        "background": "#0a0a0a",
                        "surface-container-low": "#1c1c1c",
                        "surface-container": "#252525",
                        "surface-container-high": "#2b2b2b",
                        "surface-container-highest": "#333333",
                        "surface-bright": "#383838",
                        "inverse-surface": "#e6e1e0",
                        "inverse-on-surface": "#30312e"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0a0a0a;
            color: #e6e1e0;
        }

        .nav-logo {
            view-transition-name: main-logo;
        }

        .nav-links {
            view-transition-name: main-nav-links;
        }

        .editorial-gradient {
            background: linear-gradient(135deg, #869489 0%, #394b41 100%);
        }

        .textarea-glow:focus-within {
            box-shadow: 0 0 40px -10px rgba(134, 148, 137, 0.15);
        }

        @keyframes sync-glow {

            0%,
            100% {
                opacity: 1;
                filter: drop-shadow(0 0 2px rgba(52, 211, 153, 0.4));
            }

            50% {
                opacity: 0.6;
                filter: drop-shadow(0 0 12px rgba(52, 211, 153, 0.8));
            }
        }

        .animate-sync-glow {
            animation: sync-glow 2s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-background text-on-surface min-h-screen selection:bg-primary/30">
    <!-- TopNavBar (Shared Component 8) -->
    <nav
        class="fixed top-0 w-full z-50 bg-stone-950/70 backdrop-blur-xl shadow-2xl shadow-black/50 font-['Manrope'] antialiased">
        <div class="flex justify-between items-center w-full px-8 py-4 max-w-screen-2xl mx-auto">
            <div class="nav-logo text-xl font-bold tracking-tighter text-stone-100">REMI</div>
            <!-- Desktop Nav Links -->
            <div class="nav-links hidden md:flex items-center space-x-8">
                <a class="text-stone-400 hover:text-stone-200 transition-colors" href="/index.html">Home</a>
                <a class="text-emerald-200 font-semibold border-b-2 border-emerald-200 pb-1" href="/journal.html">Recipe
                    Book</a>
                <a class="text-stone-400 hover:text-stone-200 transition-colors" href="/find.html">Meal Finder</a>
                <div class="flex items-center gap-6">
                    <button onclick="logout()"
                        class="bg-[#bccabe] text-[#36433a] px-6 py-2.5 rounded-md text-sm font-semibold tracking-tight scale-98 active:opacity-80 transition-all">Logout</button>
                </div>
            </div>
        </div>
    </nav>
    <!-- Main Content Canvas -->
    <main class="pt-32 pb-40 px-6 max-w-5xl mx-auto">
        <!-- Header Section -->
        <header class="mb-16">
            <span class="text-primary font-bold tracking-[0.2em] text-[10px] uppercase block mb-4">Teaching Remi</span>
            <h1 class="text-5xl md:text-7xl font-extrabold text-on-surface tracking-tighter leading-none mb-6">
                Tell us your <br /><span class="text-primary italic font-medium">culinary story.</span>
            </h1>
            <p class="text-on-surface-variant text-lg max-w-xl leading-relaxed">
                Describe your dish, the process, and every ingredient. Our engine learns your style to suggest pairings
                that honor your heritage.
            </p>
        </header>
        <!-- Input Section: The Natural Language Field -->
        <section class="mb-20">
            <div
                class="bg-surface-container-low rounded-xl p-8 md:p-12 transition-all duration-500 focus-within:bg-surface-container-high border border-outline-variant/10 textarea-glow">
                <label class="block text-primary/70 font-bold text-xs mb-4 tracking-widest uppercase"
                    for="recipe-input">JOURNAL ENTRY</label>
                <textarea
                    class="w-full bg-transparent border-none focus:ring-0 text-lg font-mono text-on-surface placeholder:text-on-surface-variant/20 leading-snug min-h-[300px] resize-none"
                    id="recipe-input" placeholder='Today for lunch I made Chicken Tikka. First, made a marinade with about 2-3 spoons of yogurt, tandoori masala, spices, lemon juice, 2 tbps ginger garlic paste and added about 500 g of chicken. Kept it in the fridge for 2 hours and grilled it for about 7 minutes. Served with pickled onions.
                    '></textarea>
                <div class="mt-8 flex items-center justify-between">
                    <div id="ai_mapping" class="flex items-center space-x-4 text-on-surface-variant/40">
                        <span class="material-symbols-outlined text-sm">auto_fix_high</span>
                        <span class="text-xs font-medium tracking-widest uppercase">AI Mapping Active</span>
                    </div>
                    <button id="record-dish-btn" onclick="saveRecipe()"
                        class="editorial-gradient text-on-primary px-8 py-3 rounded-full font-bold text-sm shadow-xl hover:brightness-110 active:scale-95 transition-all">
                        Record Dish
                    </button>
                </div>
            </div>
        </section>
        <div id="review-overlay"
            class="hidden fixed inset-0 z-[60] flex items-center justify-center p-6 bg-stone-950/80 backdrop-blur-md">
            <div
                class="bg-surface-container-high border border-outline-variant/20 rounded-2xl max-w-2xl w-full p-8 shadow-2xl animate-in fade-in zoom-in duration-300">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <span class="text-primary font-bold tracking-widest text-[10px] uppercase">Reviewing
                            Perception</span>
                        <h2 id="preview-name" class="text-3xl font-bold text-on-surface tracking-tight mt-1"></h2>
                    </div>
                    <button onclick="closeReview()" class="text-on-surface-variant hover:text-white transition-colors">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>

                <div id="preview-ingredients" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-10">
                </div>

                <div class="flex flex-col md:flex-row gap-4">
                    <button id="confirm-btn" onclick="finalCommit()"
                        class="flex-1 editorial-gradient text-on-primary py-4 rounded-xl font-bold text-sm shadow-lg hover:brightness-110 active:scale-95 transition-all">
                        Looks Perfect, Record It
                    </button>
                    <button onclick="closeReview()"
                        class="flex-1 bg-surface-container text-on-surface-variant border border-outline-variant/20 py-4 rounded-xl font-bold text-sm hover:bg-surface-container-highest transition-all">
                        Wait, Let Me Edit
                    </button>
                </div>
            </div>
        </div>
        <section id="recent-saved-section" class="mt-16 pt-10 border-t border-outline/20">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-extrabold tracking-tight">Recently Recorded</h2>
                <a href="/find.html"
                    class="text-primary font-bold text-xs uppercase tracking-widest hover:underline">See Finder</a>
            </div>
            <div id="recent-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4">
            </div>
        </section>
    </main>

    <!-- <script src="/auth.js"></script> -->
    <script>
        // 1. STATE MANAGEMENT
        let currentDraftData = null;

        // 2. INITIAL LOAD
        document.addEventListener('DOMContentLoaded', loadRecent);

        const ILLUSTRATIONS = [
            "https://plus.unsplash.com/premium_vector-1722661980261-a06040a64ea4?q=80&w=1480&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1741366488984-c2c93a8849cb?q=80&w=1674&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1741366488922-284260538d01?q=80&w=1674&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1741366488984-91b0039c0336?q=80&w=1674&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1741366488757-8d4e34570303?q=80&w=1035&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1756902133272-8ce3d151d670?q=80&w=1010&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1741109886479-096317749fe7?q=80&w=1011&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1736254664484-b69ad6fb4125?w=900&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1758513947785-9d69574483f5?q=80&w=1064&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1769172620473-8703d9fa87cd?q=80&w=1480&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1738740828565-e195444e403e?q=80&w=987&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1739875207991-5a965f8ac0ee?q=80&w=996&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1724853557152-10ef36389830?q=80&w=1035&auto=format&fit=crop",
            "https://plus.unsplash.com/premium_vector-1723208948729-6b8b3d3a65e3?q=80&w=1064&auto=format&fit=crop"
        ];

        function getIllustration(imageIndex) {
            // Fallback to random if imageIndex is null (older recipes)
            const index = (imageIndex !== null && imageIndex !== undefined)
                ? imageIndex
                : Math.floor(Math.random() * ILLUSTRATIONS.length);
            return ILLUSTRATIONS[index];
        }

        /**
         * Phase 1: ANALYZE
         * Takes raw text from the textarea and sends it to Bedrock (Draft Endpoint)
         */
        async function saveRecipe() {
            const inputArea = document.getElementById('recipe-input');
            const rawText = inputArea.value.trim();
            const loading = document.getElementById('ai_mapping');
            const saveBtn = document.getElementById('record-dish-btn');

            if (!rawText) {
                alert("Please share your culinary story before recording.");
                return;
            }

            // UI Feedback: Start the "Perception" Glow
            saveBtn.disabled = true;
            loading.classList.add('animate-sync-glow', 'text-white');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = "Remi is perceiving...";

            try {
                // Step 1: Request structured JSON from the AI Draft endpoint
                const response = await fetch("/api/recipes/draft", {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: rawText
                });

                if (!response.ok) throw new Error("AI Mapping failed");

                const draftedJSON = await response.json();

                // Store the data and original input for the final save
                currentDraftData = {
                    ...draftedJSON,
                    rawInput: rawText
                };

                // Step 2: Open the Review Overlay
                openReview(currentDraftData);

            } catch (err) {
                console.error("Analysis Error:", err);
                alert("Remi couldn't quite map that. Try being a bit more descriptive with ingredients.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = originalText;
                loading.classList.remove('animate-sync-glow', 'text-white');
            }
        }

        /**
         * Phase 2: REVIEW
         * Injects the AI's "perception" into the Bento-style review card
         */
        function openReview(data) {
            document.getElementById('preview-name').innerText = data.name;
            const grid = document.getElementById('preview-ingredients');

            // Render ingredients: Handles null quantity as "To Taste"
            grid.innerHTML = data.ingredients.map(ing => `
                <div class="flex items-center p-4 bg-stone-900/50 rounded-xl border border-white/5 group hover:border-primary/30 transition-colors">
                    <span class="material-symbols-outlined text-primary/40 mr-3 text-xl group-hover:text-primary transition-colors">restaurant</span>
                    <div>
                        <p class="text-[10px] text-stone-500 uppercase tracking-widest font-bold">
                            ${ing.quantity ? `${ing.quantity} ${ing.unit || ''}` : 'To Taste'}
                        </p>
                        <p class="text-stone-200 font-medium text-sm">${ing.name}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('review-overlay').classList.remove('hidden');
        }

        /**
         * Phase 3: CONFIRM & COMMIT
         * Sends the verified data to the permanent database
         */
        async function finalCommit() {
            console.log("Attempting to commit:", currentDraftData); // Debug line
            if (!currentDraftData) {
                console.error("No draft data found to save.");
                return;
            }

            const confirmBtn = document.getElementById('confirm-btn');
            confirmBtn.disabled = true;
            confirmBtn.innerText = "Recording to Journal...";

            try {
                const response = await fetch("/api/recipes", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(currentDraftData)
                });

                if (response.ok) {
                    // Success Flow
                    closeReview();
                    document.getElementById('recipe-input').value = "";
                    await loadRecent(); // Refresh the grid below
                    currentDraftData = null;
                    // alert("Dish successfully recorded in your journal!");
                } else {
                    const errorText = await response.text();
                    alert("Server Error: " + errorText);
                }
            } catch (err) {
                console.error("Save Error:", err);
                alert("Connection lost. Please check your backend.");
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.innerText = "Looks Perfect, Record It";
            }
        }

        function closeReview() {
            document.getElementById('review-overlay').classList.add('hidden');
        }

        /**
         * UI HELPER: Load Recently Recorded Grid
         */
        async function loadRecent() {
            const grid = document.getElementById('recent-grid');
            const section = document.getElementById('recent-saved-section');

            try {
                const response = await fetch("/api/recipes");
                const recipes = await response.json();

                if (recipes && recipes.length > 0) {
                    section.classList.remove('hidden');
                    const recent = [...recipes].reverse().slice(0, 5);

                    grid.innerHTML = recent.map((recipe) => {
                        const imageUrl = getIllustration(recipe.imageIndex);
                        return `
                    <div class="space-y-3 group cursor-pointer animate-in fade-in slide-in-from-bottom-2 duration-700">
                        <div class="aspect-[3/4] overflow-hidden rounded-xl bg-surface border border-outline/10 relative shadow-inner">
                            <img src="${imageUrl}" 
                                 class="w-full h-full object-cover opacity-60 group-hover:opacity-100 group-hover:scale-110 transition-all duration-700" />
                            <div class="absolute inset-0 bg-primary/5 group-hover:bg-transparent transition-colors"></div>
                        </div>
                        <div class="px-1">
                            <h4 class="font-bold text-sm text-on-surface truncate group-hover:text-primary transition-colors">${recipe.name}</h4>
                            <p class="text-[9px] text-on-surface-variant uppercase tracking-widest font-bold mt-0.5">${new Date(recipe.createdAt).toLocaleDateString()}</p>
                        </div>
                    </div>`;
                    }).join('');
                } else {
                    section.classList.add('hidden');
                }
            } catch (err) {
                console.error("Load Error:", err);
            }
        }

        function login() { window.location.href = "login.html"; }
        function logout() { console.log("Logging out..."); window.location.href = "index.html"; }
    </script>
</body>

</html>
